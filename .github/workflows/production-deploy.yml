name: "🚀 BoostUp Production Pipeline"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Deploy-Production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}

      - name: Notify on Success (Slack)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"✅ *PRODUCTION DEPLOYED SUCCESSFULLY!*\nWeb: https://drinkboostup.cz/\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on Failure (Slack)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🔥 *PRODUCTION DEPLOY FAILED!*\nCheck results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  Performance-Audit:
    name: "📊 Performance Audit (Production)"
    runs-on: ubuntu-latest
    needs: [Deploy-Production]
    if: success()
    steps:
      - uses: actions/checkout@v4
      - name: Audit Production URL
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://drinkboostup.cz/
          configPath: .github/lighthouse/lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./lighthouse-budget.json
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
