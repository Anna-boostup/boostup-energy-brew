name: "🚀 BoostUp CI/CD Pipeline"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - development
      - preview
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. DEPLOY TO TEST (test.drinkboostup.cz)
  Deploy-to-Test:
    name: "🧪 Deploy to Test"
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.49.1-noble
    if: github.ref == 'refs/heads/development'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: |
          npm ci
          npm install --global vercel@latest
        
      - name: Pull Vercel Env
        run: vercel pull --yes --environment=development --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
        
      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PREVIEW }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          
      - name: Deploy to Test
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }} | tail -n 1)
          vercel alias set $DEPLOYMENT_URL test.drinkboostup.cz --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
          echo "DEPLOYMENT_URL=https://test.drinkboostup.cz" >> $GITHUB_ENV
          echo "url=https://test.drinkboostup.cz" >> $GITHUB_OUTPUT

      - name: Wait for 200 OK
        run: |
          timeout 120s bash -c 'until curl -sI -L -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" "$DEPLOYMENT_URL" | grep "200" > /dev/null; do sleep 5; done'
          
      # Browsers are pre-installed in the container, but we ensure chromium for our tests
      - name: Ensure Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: npx playwright test tests/smoke.spec.ts tests/checkout_scenarios.spec.ts tests/admin.spec.ts tests/mobile.spec.ts tests/admin-mobile.spec.ts
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ env.DEPLOYMENT_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_BASIC_EMAIL: ${{ secrets.TEST_BASIC_EMAIL }}
          TEST_BASIC_PASSWORD: ${{ secrets.TEST_BASIC_PASSWORD }}
          TEST_COMPANY_EMAIL: ${{ secrets.TEST_COMPANY_EMAIL }}
          TEST_COMPANY_PASSWORD: ${{ secrets.TEST_COMPANY_PASSWORD }}

      - name: Notify on Success (Slack)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"✅ *TEST DEPLOYED SUCCESSFULLY!*\nUrl: https://test.drinkboostup.cz\nTests passed. Ready for promote to preview.\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on Failure (Slack)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🚨 *CI/CD PIPELINE FAILED!* (Deploy to Test)\nBranch: ${{ github.ref }}\nCheck results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  # 2. DEPLOY PREVIEW (preview.drinkboostup.cz)
  Deploy-Preview:
    name: "🌐 Deploy Preview"
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.49.1-noble
    if: github.ref == 'refs/heads/preview'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PREVIEW }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy & Alias
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }} | tail -n 1)
          vercel alias set $DEPLOYMENT_URL preview.drinkboostup.cz --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}

      - name: Wait for 200 OK
        run: |
          timeout 120s bash -c 'until curl -sI -L -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" "https://preview.drinkboostup.cz" | grep "200" > /dev/null; do sleep 5; done'
          
      # Browsers are pre-installed in the container
      - name: Ensure Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: npx playwright test tests/smoke.spec.ts tests/checkout_scenarios.spec.ts tests/admin.spec.ts tests/mobile.spec.ts tests/admin-mobile.spec.ts
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://preview.drinkboostup.cz
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_BASIC_EMAIL: ${{ secrets.TEST_BASIC_EMAIL }}
          TEST_BASIC_PASSWORD: ${{ secrets.TEST_BASIC_PASSWORD }}
          TEST_COMPANY_EMAIL: ${{ secrets.TEST_COMPANY_EMAIL }}
          TEST_COMPANY_PASSWORD: ${{ secrets.TEST_COMPANY_PASSWORD }}

      - name: Notify on Success (Slack)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"✅ *PREVIEW DEPLOYED & TESTED SUCCESSFULLY!*\nUrl: https://preview.drinkboostup.cz\nAll E2E tests passed.\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on Failure (Slack)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🚨 *PREVIEW DEPLOY FAILED!*\nUrl: https://preview.drinkboostup.cz\nCheck results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  # 3. DEPLOY PRODUCTION (drinkboostup.cz)
  Deploy-Production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_GA_ID: ${{ secrets.VITE_GA_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy to Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope ${{ env.VERCEL_ORG_ID }}

      - name: Notify on Success (Slack)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"✅ *PRODUCTION DEPLOYED SUCCESSFULLY!*\nWeb: https://drinkboostup.cz/\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on Failure (Slack)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"🔥 *PRODUCTION DEPLOY FAILED!*\nCheck results: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  # 4. PERFORMANCE AUDIT (Lighthouse)
  Performance-Audit:
    name: "📊 Performance Audit"
    runs-on: ubuntu-latest
    needs: [Deploy-Preview, Deploy-Production]
    if: always() && (needs.Deploy-Preview.result == 'success' || needs.Deploy-Production.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Audit URLs
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://drinkboostup.cz/
            https://preview.drinkboostup.cz/
          configPath: .github/lighthouse/lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./lighthouse-budget.json
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
