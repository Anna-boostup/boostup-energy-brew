name: Vercel Deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
      - development
      - preview

permissions:
  contents: write

jobs:
  Test-and-Promote:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=development --token=${{ secrets.VERCEL_TOKEN }}
        
      - name: Create .env file for Vite Build
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VERCEL_AUTOMATION_BYPASS_SECRET=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" >> .env
        
      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1)
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> $GITHUB_ENV
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

      - name: Wait for Deployment Ready
        run: |
          echo "Verifying Deployment URL: [$DEPLOYMENT_URL]"
          if [ -z "$DEPLOYMENT_URL" ]; then echo "ERROR: DEPLOYMENT_URL is empty! Check URL extraction step."; exit 1; fi
          timeout 120s bash -c 'until curl -sI -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" "$DEPLOYMENT_URL" | grep "200" > /dev/null; do echo "Waiting for 200 OK from $DEPLOYMENT_URL..."; sleep 5; done'
          
      - name: Verify Application Health (Prevent White Screen)
        run: |
          echo "Fetching page content from $DEPLOYMENT_URL..."
          BODY=$(curl -s -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" "$DEPLOYMENT_URL")
          echo "Page Content Preview (First 1000 chars):"
          echo "$BODY" | head -c 1000
          echo ""
          
          if [[ "$BODY" == *"Authentication Required"* ]]; then
            echo "ERROR: Vercel Protection Bypass failed! Check VERCEL_AUTOMATION_BYPASS_SECRET."
            exit 1
          fi

          if [[ "$BODY" != *"id=\"root\""* ]]; then
            echo "ERROR: Root element <div id=\"root\"> missing! Rendering failure detected."
            exit 1
          fi
          
          if [[ "$BODY" == *"Aplikace se zhroutila"* ]]; then
            echo "ERROR: React application crashed! ErrorBoundary detected on the page."
            exit 1
          fi

          echo "SUCCESS: App root element found and no crash detected. Proceeding to tests."

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Post-Deployment Verification
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ env.DEPLOYMENT_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_COMPANY_EMAIL: ${{ secrets.TEST_COMPANY_EMAIL }}
          TEST_COMPANY_PASSWORD: ${{ secrets.TEST_COMPANY_PASSWORD }}
          TEST_BASIC_EMAIL: ${{ secrets.TEST_BASIC_EMAIL }}
          TEST_BASIC_PASSWORD: ${{ secrets.TEST_BASIC_PASSWORD }}
        run: npx playwright test tests/smoke.spec.ts tests/checkout_scenarios.spec.ts tests/admin.spec.ts

      - name: Upload Test Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Auto-Promote to Preview
        if: success()
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git checkout preview
          git merge development --no-ff -m "chore: auto-promote development to preview [skip ci]"
          git push origin preview

  Deploy-Preview:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/preview'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
