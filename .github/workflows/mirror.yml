name: Mirror to Anna-boostup

on:
  push:
    branches: [ main ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Target Repo
        run: |
          git remote add target https://x-access-token:${{ secrets.TARGET_REPO_PAT }}@github.com/Anna-boostup/boostup-energy-brew.git
          git push -f target main
