name: Production Watchdog (Uptime Smoke Test)

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  Watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Cache Playwright Binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run Production Smoke Tests
        run: npx playwright test tests/smoke.spec.ts tests/mobile.spec.ts
        env:
          PLAYWRIGHT_TEST_BASE_URL: https://drinkboostup.cz/
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          # Production doesn't need admin credentials for smoke tests
          
      - name: Notify on Failure
        if: failure()
        run: |
          echo "PRODUCTION WATCHDOG FAILED!"
          # Here we could add Slack/Telegram notification in the future
