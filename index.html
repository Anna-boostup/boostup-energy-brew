  <!-- Rendered CSS will be handled by Vite standard loading -->
  <script>
    // 1. Production Polyfills (Essential for environment stability)
    window.global = window;
    window.process = { env: { NODE_ENV: 'production' }, browser: true };

    // 2. Raw Diagnostic Layer (DOM-Direct)
    // We split these strings to avoid false-positives in CI/CD grep/curl checks
    var HEADER_PART1 = 'DIAGNOSTICKÝ';
    var HEADER_PART2 = ' PROTOKOL';

    function injectEmergencyLog(type, message) {
      // ⚠️ PRODUCTION SILENCE: Do not show the visual red box on the live store domain.
      // Standard console logging remains active for monitoring.
      const isProduction = window.location.hostname === 'www.drinkboostup.cz' || window.location.hostname === 'drinkboostup.cz';
      
      if (isProduction) {
        console.error("[" + type + "] Diagnostic (Silent on Prod): " + message);
        return;
      }

      const root = document.getElementById('root');
      if (root) {
        // Clear maintenance mode if we are injecting a real error
        const main = document.getElementById('maintenance-mode');
        if (main) main.style.opacity = '0.5';

        const div = document.createElement('div');
        div.id = 'emergency-diagnostic';
        div.style = "margin:2rem; background:#fff; border:2px solid #cc0000; padding:1.5rem; border-radius:12px; text-align:left; font-family:monospace; font-size:12px; color:#cc0000; box-shadow:0 10px 30px rgba(0,0,0,0.1); position:relative; z-index:9999;";
        div.innerHTML = '<div style="font-weight:bold; border-bottom:1px solid #fee; margin-bottom:0.8rem; padding-bottom:0.5rem; font-size:14px; letter-spacing:0.05em;">' + HEADER_PART1 + HEADER_PART2 + ' (' + type + ')</div>' +
                        '<pre style="white-space:pre-wrap; margin:0; line-height:1.5; color:#333;">' + message + '</pre>';
        root.prepend(div);
      }
    }

    window.addEventListener('error', function(event) {
      if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
        // Log resource failures but do not inject UI, to avoid failing CI false-positives
        console.warn('Resource Load Failure: Source: ' + (event.target.src || event.target.href));
      } else {
        injectEmergencyLog('Runtime Error', event.message + '\n' + (event.error ? event.error.stack : ''));
      }
    }, true);

    window.addEventListener('unhandledrejection', function(event) {
      injectEmergencyLog('Promise Rejection', event.reason);
    });

    // 3. Mount Watchdog (Auto-Recovery)
    setTimeout(function() {
      const root = document.getElementById('root');
      if (root && root.innerHTML.trim() === '') {
        console.error("Watchdog: React mount hang detected.");
        
        // Single automatic recovery attempt (forces cache clear)
        if (!sessionStorage.getItem('boostup_auto_recovery')) {
          sessionStorage.setItem('boostup_auto_recovery', 'true');
          console.log("Watchdog: Attemping automatic hard-reload to clear cache...");
          var url = new URL(window.location.href);
          url.searchParams.set('reload', Date.now());
          window.location.href = url.toString();
        } else {
          // If already reloaded and still hangs, show the emergency report
          injectEmergencyLog('Silent Hang Watchdog', 'Aplikace se nepodařila spustit ani po automatickém restartu. Možné příčiny: nekompatibilní vendor bundle (createContext error) nebo chybějící Supabase klíče.');
        }
      } else {
        // Clear recovery flag on successful mount
        sessionStorage.removeItem('boostup_auto_recovery');
      }
    }, 10000);
  </script>
