  <script>
    // Global Error Guard (Capturing Phase) for early detection
    function showDiagnostics(type, message) {
      var debug = document.getElementById('debug-info');
      var log = document.getElementById('error-log');
      if (debug && log) {
        debug.style.display = 'block';
        log.innerText = type + '\n' + message;
      }
    }

    window.addEventListener('error', function(event) {
      if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
        showDiagnostics('Resource Load Failure', 'Source: ' + (event.target.src || event.target.href));
      } else {
        showDiagnostics('Runtime Error', 'Message: ' + event.message + '\nStack: ' + (event.error ? event.error.stack : 'N/A'));
      }
    }, true);
    
    window.addEventListener('unhandledrejection', function(event) {
      showDiagnostics('Promise Rejection', 'Reason: ' + event.reason);
    });

    // Capture console.error to find "swallowed" crashes in contexts
    const _origError = console.error;
    console.error = function() {
      const msg = Array.from(arguments).join(' ');
      if (msg.toLowerCase().includes('error') || msg.toLowerCase().includes('fail')) {
        showDiagnostics('Console Error Caught', msg);
      }
      _origError.apply(console, arguments);
    };
  </script>
